<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解深密經 · 公開上線剪綵典禮</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  cursor: none;
  min-height: 100vh;
  background: url('bg.png') center center / cover no-repeat fixed;
  overflow: hidden;
  font-family: 'Noto Serif TC', 'STSong', '宋体', 'SimSun', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  transition: opacity 0.7s;
}

/* ── Background sparkle canvas ── */
#bgcvs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Outer frame lines ── */
.frame-h {
  position: fixed;
  left: 40px; right: 40px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,160,50,0.35) 20%, rgba(200,160,50,0.35) 80%, transparent);
  pointer-events: none;
  z-index: 1;
}
.frame-h.top    { top: 30px; }
.frame-h.bottom { bottom: 30px; }
.frame-v {
  position: fixed;
  top: 40px; bottom: 40px;
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(200,160,50,0.35) 20%, rgba(200,160,50,0.35) 80%, transparent);
  pointer-events: none;
  z-index: 1;
}
.frame-v.left  { left: 30px; }
.frame-v.right { right: 30px; }
.frame-corner {
  position: fixed;
  width: 18px; height: 18px;
  border-color: rgba(200,160,50,0.5);
  border-style: solid;
  pointer-events: none;
  z-index: 1;
}
.frame-corner.tl { top: 24px; left: 24px;  border-width: 1px 0 0 1px; }
.frame-corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
.frame-corner.bl { bottom: 24px; left: 24px;  border-width: 0 0 1px 1px; }
.frame-corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

/* ── Header ── */
.header {
  text-align: center;
  position: relative;
  z-index: 5;
  margin-bottom: 80px;
  animation: headerIn 2s ease both;
}
@keyframes headerIn {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Ornate top rule */
.top-rule {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 26px;
}
.rule-line {
  width: 100px;
  height: 1px;
  background: linear-gradient(to right, transparent, #c9a84c 60%, #e8d070);
}
.rule-line.rev { background: linear-gradient(to left, transparent, #c9a84c 60%, #e8d070); }
.rule-diamond {
  width: 7px; height: 7px;
  border: 1.5px solid #c9a84c;
  transform: rotate(45deg);
  margin: 0 12px;
  flex-shrink: 0;
}
.rule-dot {
  width: 3px; height: 3px;
  background: #c9a84c;
  transform: rotate(45deg);
  margin: 0 6px;
  flex-shrink: 0;
}

/* Main title */
.title-main {
  font-size: clamp(3.2rem, 8vw, 6.5rem);
  color: #e8c96d;
  text-shadow:
    0 0 22px rgba(220,185,80,0.55),
    0 0 60px rgba(190,145,40,0.22),
    0 4px 10px rgba(0,0,0,0.95);
  letter-spacing: 0.38em;
  line-height: 1.1;
  font-weight: 700;
}

/* Subtitle block — hidden after cut */
#subtitle-block {
  transition: opacity 0.7s;
}

/* Ornate divider */
.mid-rule {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 22px auto 20px;
  width: 300px;
  max-width: 75vw;
}
.mid-rule .rule-line { width: 80px; }

.title-sub {
  font-size: clamp(1rem, 2.6vw, 1.65rem);
  color: #d4c090;
  letter-spacing: 0.48em;
  text-shadow: 0 0 12px rgba(200,180,100,0.25);
}
.title-note {
  margin-top: 10px;
  font-size: 0.88rem;
  color: rgba(200,175,110,0.42);
  letter-spacing: 0.42em;
}

/* ── Ribbon scene ── */
.scene {
  position: relative;
  width: 100vw;
  height: 120px;
  display: flex;
  align-items: center;
  z-index: 10;
  overflow: visible;
}

/* Column posts */
.post {
  position: absolute;
  top: -55px;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 8;
}
.post-l { left: 9%; }
.post-r { right: 9%; }

.post-capital {
  width: 38px; height: 22px;
  background: linear-gradient(180deg, #f0e080, #d4af37, #a07828);
  border-radius: 4px 4px 0 0;
  box-shadow: 0 0 16px rgba(200,160,40,0.45);
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.post-capital::after {
  content: '◆';
  font-size: 9px;
  color: #fffbe0;
}

.post-shaft {
  width: 20px; height: 205px;
  background: linear-gradient(180deg,
    #e8d070 0%, #c9a84c 10%,
    #a07828 35%, #c9a84c 52%,
    #a07828 68%, #c9a84c 90%, #8a6420 100%
  );
  box-shadow: 0 0 18px rgba(160,120,40,0.25), inset 3px 0 6px rgba(255,225,120,0.2);
}

.post-base {
  width: 32px; height: 14px;
  background: linear-gradient(180deg, #c9a84c, #8a6420);
  border-radius: 0 0 4px 4px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.7);
}

/* Ribbon wrapper */
.ribbon-wrap {
  position: absolute;
  left: calc(9% + 10px);
  right: calc(9% + 10px);
  top: 50%;
  transform: translateY(-50%);
  height: 82px;
}

/* Ribbon */
#ribbon {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    #4a0000 0%,  #7a0000 4%,  #a50008 12%,
    #c8000c 24%, #e0000f 38%, #ee1a1a 50%,
    #e0000f 62%, #c8000c 76%,
    #a50008 88%, #7a0000 96%, #4a0000 100%
  );
  display: flex;
  align-items: center;
  justify-content: center;
  transition: filter 0.15s;
}
/* Heavy gold trim */
#ribbon::before, #ribbon::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 9px;
  background: linear-gradient(90deg,
    rgba(160,120,40,0.1) 0%,
    #c9a84c 4%,  #e0ca60 18%,
    #fdf5c0 50%, #e0ca60 82%,
    #c9a84c 96%, rgba(160,120,40,0.1) 100%
  );
  box-shadow: 0 0 10px rgba(220,185,80,0.35);
}
#ribbon::before { top: 0; }
#ribbon::after  { bottom: 0; }

#ribbon.lit {
  filter: brightness(1.22) drop-shadow(0 0 16px rgba(255,50,50,0.5));
}

.ribbon-label {
  color: #fdf5c0;
  font-size: clamp(0.85rem, 1.7vw, 1.25rem);
  letter-spacing: 0.65em;
  font-weight: 700;
  text-shadow: 0 1px 6px rgba(0,0,0,0.75), 0 0 15px rgba(255,230,120,0.28);
  pointer-events: none;
}

/* Ribbon halves after cut */
.rhalf {
  position: absolute;
  height: 82px;
  background: linear-gradient(180deg,
    #4a0000, #7a0000, #a50008, #c8000c, #a50008, #7a0000, #4a0000
  );
  border-top: 9px solid #c9a84c;
  border-bottom: 9px solid #c9a84c;
}
.rhalf-l { left: 0;  transform-origin: 0 50%; }
.rhalf-r { right: 0; transform-origin: 100% 50%; }

/* ── Confetti ── */
#confetti {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 300;
}

/* ── Victory overlay ── */
#victory {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 400;
  pointer-events: none;
  opacity: 0;
  background: rgba(2,2,8,0);
  transition: opacity 1s, background 1s;
}
#victory.on {
  opacity: 1;
  background: rgba(2,2,8,0.78);
}

/* ── Finale full-screen image ── */
#finale {
  position: fixed; inset: 0;
  z-index: 500;
  pointer-events: none;
  opacity: 0;
  background: url('main.png') center center / cover no-repeat;
  transition: opacity 1.5s;
}
#finale.on { opacity: 1; }

.v-card {
  text-align: center;
  padding: 52px 80px 48px;
  position: relative;
  border: 1px solid rgba(200,160,55,0.45);
  background: linear-gradient(150deg, rgba(8,6,18,0.97) 0%, rgba(12,8,22,0.97) 100%);
}
/* Double border effect */
.v-card::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(200,160,55,0.18);
  pointer-events: none;
}
/* Four corner ornaments */
.v-corner {
  position: absolute;
  width: 20px; height: 20px;
  color: #c9a84c;
  font-size: 1rem;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.v-corner.tl { top: -10px; left: -10px; }
.v-corner.tr { top: -10px; right: -10px; }
.v-corner.bl { bottom: -10px; left: -10px; }
.v-corner.br { bottom: -10px; right: -10px; }

.v-top-deco {
  color: #b8962a;
  font-size: 0.75rem;
  letter-spacing: 0.5em;
  margin-bottom: 24px;
}
.v-main {
  font-size: clamp(2.8rem, 6.5vw, 5.5rem);
  color: #e8c96d;
  letter-spacing: 0.42em;
  text-shadow:
    0 0 28px rgba(220,185,80,0.75),
    0 0 70px rgba(180,140,50,0.35);
  animation: vpulse 2.5s ease-in-out infinite;
  line-height: 1.2;
}
.v-rule {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 22px auto;
  width: 260px;
}
.v-rule .rule-line { width: 70px; }
.v-sub {
  font-size: clamp(0.85rem, 1.9vw, 1.4rem);
  color: #c0aa78;
  letter-spacing: 0.5em;
}
@keyframes vpulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.03); }
}

/* ── Scissors cursor – gold handles ── */
#cur {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 96px; height: 96px;
  margin-left: -82px;
  margin-top: -48px;
}

/* ── Hint ── */
#hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(200,170,90,0.48);
  font-size: 0.9rem;
  letter-spacing: 0.32em;
  pointer-events: none;
  z-index: 10;
  white-space: nowrap;
  animation: hpulse 3s ease-in-out infinite;
  transition: opacity 0.5s;
}
@keyframes hpulse {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 0.9; }
}
</style>
</head>
<body>

<!-- Outer decorative frame -->
<div class="frame-h top"></div>
<div class="frame-h bottom"></div>
<div class="frame-v left"></div>
<div class="frame-v right"></div>
<div class="frame-corner tl"></div>
<div class="frame-corner tr"></div>
<div class="frame-corner bl"></div>
<div class="frame-corner br"></div>

<!-- Background sparkles -->
<canvas id="bgcvs"></canvas>

<!-- Header -->
<div class="header" id="header">
  <div class="top-rule">
    <div class="rule-line rev"></div>
    <div class="rule-dot"></div>
    <div class="rule-diamond"></div>
    <div class="rule-dot"></div>
    <div class="rule-line"></div>
  </div>
  <h1 class="title-main">解深密經</h1>
  <div id="subtitle-block">
    <div class="mid-rule">
      <div class="rule-line rev"></div>
      <div class="rule-dot"></div>
      <div class="rule-diamond"></div>
      <div class="rule-dot"></div>
      <div class="rule-line"></div>
    </div>
    <p class="title-sub">公開上線典禮</p>
    <p class="title-note">剪綵儀式 · 廣度有緣</p>
  </div>
</div>

<!-- Ribbon scene -->
<div class="scene">
  <div class="post post-l">
    <div class="post-capital"></div>
    <div class="post-shaft"></div>
    <div class="post-base"></div>
  </div>
  <div class="post post-r">
    <div class="post-capital"></div>
    <div class="post-shaft"></div>
    <div class="post-base"></div>
  </div>
  <div class="ribbon-wrap" id="rwrap">
    <div id="ribbon">
      <span class="ribbon-label">✦ 吉祥開幕 · 廣利有情 ✦</span>
    </div>
  </div>
</div>

<!-- Confetti -->
<canvas id="confetti"></canvas>

<!-- Finale -->
<div id="finale"></div>

<!-- Victory -->
<div id="victory">
  <div class="v-card">
    <div class="v-corner tl">◈</div>
    <div class="v-corner tr">◈</div>
    <div class="v-corner bl">◈</div>
    <div class="v-corner br">◈</div>
    <div class="v-top-deco">── ◆ ── ◆ ── ◆ ──</div>
    <div class="v-main">正式上線</div>
    <div class="v-rule">
      <div class="rule-line rev"></div>
      <div class="rule-dot"></div>
      <div class="rule-diamond"></div>
      <div class="rule-dot"></div>
      <div class="rule-line"></div>
    </div>
    <div class="v-sub">解深密經 · 廣度無量有緣</div>
  </div>
</div>

<!-- Scissors cursor — gold handles -->
<svg id="cur" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f5e8a0"/>
      <stop offset="45%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6420"/>
    </linearGradient>
    <linearGradient id="bladeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e0e0e0"/>
      <stop offset="50%"  stop-color="#c8c8c8"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
    <filter id="dropshadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Upper half -->
  <g id="bu" filter="url(#dropshadow)">
    <circle cx="14" cy="22" r="13" fill="none" stroke="#c9a84c" stroke-width="3.5"/>
    <circle cx="14" cy="22" r="8.5" fill="url(#goldH)"/>
    <circle cx="14" cy="22" r="5"   fill="none" stroke="#8a6420" stroke-width="1.5"/>
    <path d="M 25 27 L 44 48 L 82 44 L 82 48 L 44 52 L 22 32 Z" fill="url(#bladeG)" stroke="#b0b0b0" stroke-width="0.7"/>
    <line x1="27" y1="28" x2="80" y2="44" stroke="#eeeeee" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 44 48 L 82 44" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Lower half -->
  <g id="bl" filter="url(#dropshadow)">
    <circle cx="14" cy="74" r="13" fill="none" stroke="#c9a84c" stroke-width="3.5"/>
    <circle cx="14" cy="74" r="8.5" fill="url(#goldH)"/>
    <circle cx="14" cy="74" r="5"   fill="none" stroke="#8a6420" stroke-width="1.5"/>
    <path d="M 25 69 L 44 48 L 82 52 L 82 48 L 44 44 L 22 64 Z" fill="url(#bladeG)" stroke="#b0b0b0" stroke-width="0.7"/>
    <line x1="27" y1="68" x2="80" y2="52" stroke="#eeeeee" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 44 48 L 82 52" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Pivot -->
  <circle cx="44" cy="48" r="5.5" fill="#8a6420" filter="url(#dropshadow)"/>
  <circle cx="44" cy="48" r="3.5" fill="#d4af37"/>
  <circle cx="44" cy="48" r="1.5" fill="#8a6420"/>
  <line x1="42.5" y1="48" x2="45.5" y2="48" stroke="#6a4a10" stroke-width="1"/>
  <line x1="44"   y1="46.5" x2="44" y2="49.5" stroke="#6a4a10" stroke-width="1"/>
</svg>

<p id="hint">✦ 移動游標至彩帶，點擊進行剪綵 ✦</p>

<script>
(function () {
'use strict';

const PIVOT_X = 44, PIVOT_Y = 48, OPEN_DEG = 9;

const curEl     = document.getElementById('cur');
const buEl      = document.getElementById('bu');
const blEl      = document.getElementById('bl');
const ribbonEl  = document.getElementById('ribbon');
const rwrap     = document.getElementById('rwrap');
const victoryEl = document.getElementById('victory');
const finaleEl  = document.getElementById('finale');
const hintEl    = document.getElementById('hint');
const subBlock  = document.getElementById('subtitle-block');
const confCvs   = document.getElementById('confetti');
const confCtx   = confCvs.getContext('2d');
const bgCvs     = document.getElementById('bgcvs');
const bgCtx     = bgCvs.getContext('2d');

let mx = -300, my = -300, hasCut = false, snipTimer = null, sharedAc = null;

const crowdAudio = new Audio('crowd.mp3');
crowdAudio.preload = 'auto';

function getAc() {
  if (!sharedAc) sharedAc = new (window.AudioContext || window.webkitAudioContext)();
  if (sharedAc.state === 'suspended') sharedAc.resume();
  return sharedAc;
}

function setBlades(u, l) {
  buEl.setAttribute('transform', `rotate(${u},${PIVOT_X},${PIVOT_Y})`);
  blEl.setAttribute('transform', `rotate(${l},${PIVOT_X},${PIVOT_Y})`);
}
setBlades(-OPEN_DEG, OPEN_DEG);

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curEl.style.left = mx + 'px';
  curEl.style.top  = my + 'px';
  getAc();
  if (!hasCut) checkNear();
}, { passive: true });

function ribbonRect() { return ribbonEl.getBoundingClientRect(); }

let wasNear = false;
function checkNear() {
  if (!ribbonEl.isConnected) return;
  const r = ribbonRect();
  const near = my >= r.top - 18 && my <= r.bottom + 18 && mx >= r.left && mx <= r.right;
  if (near === wasNear) return;
  wasNear = near;
  ribbonEl.classList.toggle('lit', near);
  near ? startSnip() : stopSnip();
}

/* ── Snip click sound ── */
function playSnipClick() {
  try {
    const ac = getAc();
    [[2400, 900, 0], [1800, 600, 0.01]].forEach(([f0, f1, dl]) => {
      const osc = ac.createOscillator(), g = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(f0, ac.currentTime + dl);
      osc.frequency.exponentialRampToValueAtTime(f1, ac.currentTime + dl + 0.07);
      g.gain.setValueAtTime(0.2, ac.currentTime + dl);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dl + 0.09);
      const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2000;
      osc.connect(hp); hp.connect(g); g.connect(ac.destination);
      osc.start(ac.currentTime + dl); osc.stop(ac.currentTime + dl + 0.1);
    });
  } catch (_) {}
}

function startSnip() {
  if (snipTimer) return;
  snipTimer = setInterval(() => {
    setBlades(0, 0);
    playSnipClick();
    setTimeout(() => setBlades(-OPEN_DEG, OPEN_DEG), 110);
  }, 380);
}
function stopSnip() {
  clearInterval(snipTimer); snipTimer = null;
  setBlades(-OPEN_DEG, OPEN_DEG);
}

/* ── Background gold sparkles ── */
function resizeBg() { bgCvs.width = window.innerWidth; bgCvs.height = window.innerHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);

const sparkles = Array.from({ length: 90 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.8 + 0.3,
  speed: Math.random() * 0.35 + 0.08,
  baseAlpha: Math.random() * 0.35 + 0.06,
  drift: (Math.random() - 0.5) * 0.18,
  phase: Math.random() * Math.PI * 2,
  phaseSpeed: Math.random() * 0.018 + 0.006,
}));

(function bgLoop() {
  bgCtx.clearRect(0, 0, bgCvs.width, bgCvs.height);
  sparkles.forEach(s => {
    s.y -= s.speed; s.x += s.drift; s.phase += s.phaseSpeed;
    if (s.y < -4) { s.y = bgCvs.height + 4; s.x = Math.random() * bgCvs.width; }
    bgCtx.globalAlpha = s.baseAlpha * (0.4 + 0.6 * Math.abs(Math.sin(s.phase)));
    bgCtx.fillStyle = '#e8c96d';
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fill();
  });
  bgCtx.globalAlpha = 1;
  requestAnimationFrame(bgLoop);
})();

/* ── Confetti ── */
function resizeConf() { confCvs.width = window.innerWidth; confCvs.height = window.innerHeight; }
resizeConf(); window.addEventListener('resize', resizeConf);

/* Luxury palette: gold, silver, ivory, champagne, deep red */
const COLORS = [
  '#d4af37','#e8c96d','#f5e8a0','#c0c0c0','#e8e8e8',
  '#f5f0e0','#fffbe8','#8b0000','#b8860b','#fdf0a0',
];

class Flake {
  constructor(x, y, big) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2;
    const spd = big ? Math.random() * 20 + 8 : Math.random() * 7 + 2;
    this.vx = Math.cos(a) * spd;
    this.vy = Math.sin(a) * spd - (big ? 9 : 2);
    this.color = COLORS[Math.random() * COLORS.length | 0];
    this.w = Math.random() * 14 + 5;
    this.h = Math.random() * 5 + 3;
    this.a = Math.random() * Math.PI * 2;
    this.av = (Math.random() - 0.5) * 0.2;
    this.g = 0.28 + Math.random() * 0.14;
    this.drag = 0.987;
    this.life = 1;
    this.decay = 0.006 + Math.random() * 0.01;
    this.circle = Math.random() > 0.5;
  }
  tick() {
    this.vy += this.g; this.vx *= this.drag; this.vy *= this.drag;
    this.x += this.vx; this.y += this.vy; this.a += this.av; this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y); ctx.rotate(this.a);
    ctx.fillStyle = this.color;
    if (this.circle) {
      ctx.beginPath(); ctx.ellipse(0, 0, this.w/2, this.h/2, 0, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
    }
    ctx.restore();
  }
}

let flakes = [];
function burst(x, y, n, big = true) {
  for (let i = 0; i < n; i++) flakes.push(new Flake(x, y, big));
}
(function confLoop() {
  confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
  flakes = flakes.filter(f => f.life > 0 && f.y < confCvs.height + 60);
  flakes.forEach(f => { f.tick(); f.draw(confCtx); });
  requestAnimationFrame(confLoop);
})();

/* ── Audio ── */
function playSound() {
  crowdAudio.currentTime = 0;
  crowdAudio.play().catch(() => {});
}

/* ── Cut ribbon ── */
document.addEventListener('click', e => {
  if (hasCut) return;
  const r = ribbonRect();
  if (e.clientY < r.top-20 || e.clientY > r.bottom+20 || e.clientX < r.left || e.clientX > r.right) return;

  hasCut = true;
  stopSnip();
  ribbonEl.classList.remove('lit');

  setBlades(3, -3);
  setTimeout(() => setBlades(-5, 5), 90);

  playSound();

  /* Ribbon split */
  const cutX = e.clientX - r.left;
  const lh = document.createElement('div');
  lh.className = 'rhalf rhalf-l'; lh.style.width = cutX + 'px';
  const rh = document.createElement('div');
  rh.className = 'rhalf rhalf-r'; rh.style.width = (r.width - cutX) + 'px';
  ribbonEl.style.visibility = 'hidden';
  rwrap.appendChild(lh); rwrap.appendChild(rh);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    lh.style.transition = 'transform 2s cubic-bezier(0.15,0.8,0.35,1), opacity 2s';
    rh.style.transition = 'transform 2s cubic-bezier(0.15,0.8,0.35,1), opacity 2s';
    lh.style.transform = 'rotate(38deg)'; lh.style.opacity = '0';
    rh.style.transform = 'rotate(-38deg)'; rh.style.opacity = '0';
  }));

  /* Confetti */
  burst(e.clientX, e.clientY, 260, true);
  setTimeout(() => burst(e.clientX-180, e.clientY-10, 90, true), 70);
  setTimeout(() => burst(e.clientX+180, e.clientY-10, 90, true), 110);
  setTimeout(() => burst(e.clientX, e.clientY-20, 120, true), 210);
  setTimeout(() => { burst(window.innerWidth*0.2,60,60,false); burst(window.innerWidth*0.8,60,60,false); }, 450);
  setTimeout(() => { burst(window.innerWidth*0.15,80,50,false); burst(window.innerWidth*0.85,80,50,false); burst(window.innerWidth*0.5,50,70,false); }, 750);

  /* Hide subtitle block */
  subBlock.style.transition = 'opacity 0.7s';
  setTimeout(() => { subBlock.style.opacity = '0'; }, 500);
  setTimeout(() => { subBlock.style.visibility = 'hidden'; }, 1200);

  /* Hide hint */
  hintEl.style.animation = 'none';
  hintEl.style.transition = 'opacity 0.5s';
  hintEl.style.opacity = '0';
  setTimeout(() => { hintEl.style.display = 'none'; }, 600);

  /* Victory → then finale */
  setTimeout(() => victoryEl.classList.add('on'), 950);
  setTimeout(() => finaleEl.classList.add('on'), 950 + 2500);
});

})();
</script>
