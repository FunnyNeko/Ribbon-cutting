<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解深密經 · 公開上線剪綵典禮</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  cursor: none;
  min-height: 100vh;
  background: radial-gradient(ellipse at 50% 40%, #1b0a38 0%, #08031a 80%);
  overflow: hidden;
  font-family: 'Noto Serif TC', 'STSong', '宋体', 'SimSun', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Stars ── */
.star {
  position: fixed;
  border-radius: 50%;
  background: #fff;
  pointer-events: none;
  z-index: 0;
}
@keyframes twinkle {
  from { opacity: 0.08; transform: scale(0.8); }
  to   { opacity: 0.85; transform: scale(1.4); }
}

/* ── Background dharma wheel ── */
.wheel {
  position: fixed;
  font-size: 260px;
  opacity: 0.05;
  color: #c8a0ff;
  pointer-events: none;
  z-index: 0;
  line-height: 1;
}
.wheel-l { left: -80px; top: 50%; animation: spinL 90s linear infinite; }
.wheel-r { right: -80px; top: 50%; animation: spinR 70s linear infinite; }
@keyframes spinL {
  from { transform: translateY(-50%) rotate(0deg); }
  to   { transform: translateY(-50%) rotate(360deg); }
}
@keyframes spinR {
  from { transform: translateY(-50%) rotate(0deg); }
  to   { transform: translateY(-50%) rotate(-360deg); }
}

/* ── Header ── */
.header {
  text-align: center;
  position: relative;
  z-index: 5;
  margin-bottom: 90px;
  animation: headerIn 1.6s ease both;
}
@keyframes headerIn {
  from { opacity: 0; transform: translateY(-30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.title-main {
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  color: #f5c840;
  text-shadow:
    0 0 18px rgba(245,200,64,0.55),
    0 0 50px rgba(245,180,40,0.22),
    0 4px 8px rgba(0,0,0,0.85);
  letter-spacing: 0.28em;
  line-height: 1.15;
}
.title-sub {
  margin-top: 14px;
  font-size: clamp(1rem, 2.8vw, 1.7rem);
  color: #c8a0ff;
  letter-spacing: 0.45em;
  text-shadow: 0 0 22px rgba(200,160,255,0.45);
}
.title-note {
  margin-top: 8px;
  font-size: 0.95rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.35em;
}

/* ── Ribbon scene ── */
.scene {
  position: relative;
  width: 100vw;
  height: 110px;
  display: flex;
  align-items: center;
  z-index: 10;
  overflow: visible;
}

/* Gold posts */
.post {
  position: absolute;
  top: -35px;
  width: 18px;
  height: 180px;
  border-radius: 9px 9px 2px 2px;
  background: linear-gradient(180deg, #ffe070 0%, #c8920a 40%, #a07000 80%, #c8920a 100%);
  box-shadow: 0 0 18px rgba(255,215,0,0.28), 2px 0 4px rgba(0,0,0,0.5);
  z-index: 8;
}
.post-l { left: 8%; }
.post-r { right: 8%; }
.post::before {
  content: '';
  position: absolute;
  top: -16px; left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #fffbe0, #ffd700 55%, #a07000);
  box-shadow: 0 0 14px rgba(255,215,0,0.55);
}

/* Ribbon wrapper */
.ribbon-wrap {
  position: absolute;
  left: calc(8% + 9px);
  right: calc(8% + 9px);
  top: 50%;
  transform: translateY(-50%);
  height: 74px;
}

/* The ribbon */
#ribbon {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    #7a0000 0%, #b00000 6%, #dd1010 18%,
    #ff3a3a 38%, #ff5555 50%,
    #ff3a3a 62%, #dd1010 78%,
    #b00000 90%, #7a0000 100%
  );
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  transition: filter 0.15s;
}
/* Gold edge lines */
#ribbon::before, #ribbon::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,215,0,0.3) 3%,
    #ffd700 15%,
    #ffe87c 50%,
    #ffd700 85%,
    rgba(255,215,0,0.3) 97%,
    transparent 100%
  );
}
#ribbon::before { top: 0; }
#ribbon::after  { bottom: 0; }

#ribbon.lit {
  filter: brightness(1.3) drop-shadow(0 0 12px rgba(255,80,80,0.55));
}
.ribbon-label {
  color: #ffd700;
  font-size: clamp(0.85rem, 1.8vw, 1.25rem);
  letter-spacing: 0.65em;
  font-weight: bold;
  text-shadow: 0 1px 5px rgba(0,0,0,0.65), 0 0 10px rgba(255,215,0,0.25);
  pointer-events: none;
}

/* Ribbon halves after cut */
.rhalf {
  position: absolute;
  height: 74px;
  background: linear-gradient(180deg,
    #7a0000, #b00000, #dd1010, #ff3a3a, #dd1010, #b00000, #7a0000
  );
  border-top: 6px solid #ffd700;
  border-bottom: 6px solid #ffd700;
}
.rhalf-l { left: 0; transform-origin: 0 50%; }
.rhalf-r { right: 0; transform-origin: 100% 50%; }

/* ── Confetti canvas ── */
#confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 300;
}

/* ── Victory overlay ── */
#victory {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 400;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s;
}
#victory.on { opacity: 1; }
.v-main {
  font-size: clamp(2.2rem, 5.5vw, 4.5rem);
  color: #ffd700;
  letter-spacing: 0.3em;
  text-shadow: 0 0 40px rgba(255,215,0,0.75), 0 0 80px rgba(255,160,0,0.3);
  animation: vpulse 2s ease-in-out infinite;
}
.v-sub {
  margin-top: 20px;
  font-size: clamp(1rem, 2.5vw, 1.7rem);
  color: #c8a0ff;
  letter-spacing: 0.45em;
  text-shadow: 0 0 20px rgba(200,160,255,0.5);
}
@keyframes vpulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.04); }
}

/* ── Scissors cursor ── */
#cur {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 96px;
  height: 96px;
  /* blade-tip at (82,48) should be at mouse; shift so tip = mouse */
  margin-left: -82px;
  margin-top: -48px;
}

/* ── Hint ── */
#hint {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.48);
  font-size: 1rem;
  letter-spacing: 0.25em;
  pointer-events: none;
  z-index: 10;
  white-space: nowrap;
  animation: hpulse 2.5s ease-in-out infinite;
  transition: opacity 0.5s;
}
@keyframes hpulse {
  0%,100% { opacity: 0.35; }
  50%      { opacity: 0.9; }
}
</style>
</head>
<body>

<!-- Decorative wheels -->
<div class="wheel wheel-l">☸</div>
<div class="wheel wheel-r">☸</div>

<!-- Header -->
<div class="header">
  <h1 class="title-main">解深密經</h1>
  <p class="title-sub">公開上線典禮</p>
  <p class="title-note">剪綵儀式 · 廣度有緣</p>
</div>

<!-- Ribbon scene -->
<div class="scene">
  <div class="post post-l"></div>
  <div class="post post-r"></div>
  <div class="ribbon-wrap" id="rwrap">
    <div id="ribbon">
      <span class="ribbon-label">✦ 吉祥開幕 · 廣利有情 ✦</span>
    </div>
  </div>
</div>

<!-- Canvases -->
<canvas id="confetti"></canvas>

<!-- Victory -->
<div id="victory">
  <div class="v-main">🎊 正式上線！🎊</div>
  <div class="v-sub">解深密經 · 廣度無量有緣</div>
</div>

<!-- Scissors cursor SVG
     Pivot at (44,48). Blades extend to tip at ~(82,48).
     Upper blade group: handle ring top-left, blade up-right.
     Lower blade group: handle ring bottom-left, blade down-right.
-->
<svg id="cur" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metalG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Upper half: handle + blade, rotates around pivot (44,48) -->
  <g id="bu" filter="url(#shadow)">
    <!-- Handle ring -->
    <circle cx="14" cy="22" r="13" fill="none" stroke="#a0a0a0" stroke-width="3.5"/>
    <circle cx="14" cy="22" r="8.5" fill="url(#metalG)"/>
    <!-- Finger hole -->
    <circle cx="14" cy="22" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
    <!-- Upper blade body -->
    <path d="M 25 27 L 44 48 L 82 44 L 82 48 L 44 52 L 22 32 Z"
          fill="#d0d0d0" stroke="#aaa" stroke-width="0.8"/>
    <!-- Blade shine -->
    <line x1="27" y1="28" x2="80" y2="44" stroke="#eee" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Cutting edge highlight -->
    <path d="M 44 48 L 82 44" stroke="#f5f5f5" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Lower half -->
  <g id="bl" filter="url(#shadow)">
    <circle cx="14" cy="74" r="13" fill="none" stroke="#a0a0a0" stroke-width="3.5"/>
    <circle cx="14" cy="74" r="8.5" fill="url(#metalG)"/>
    <circle cx="14" cy="74" r="5" fill="none" stroke="#888" stroke-width="1.5"/>
    <path d="M 25 69 L 44 48 L 82 52 L 82 48 L 44 44 L 22 64 Z"
          fill="#d0d0d0" stroke="#aaa" stroke-width="0.8"/>
    <line x1="27" y1="68" x2="80" y2="52" stroke="#eee" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 44 48 L 82 52" stroke="#f5f5f5" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Pivot screw -->
  <circle cx="44" cy="48" r="5.5" fill="#888" filter="url(#shadow)"/>
  <circle cx="44" cy="48" r="3.5" fill="#bbb"/>
  <circle cx="44" cy="48" r="1.5" fill="#888"/>
  <!-- Screw slot -->
  <line x1="42.5" y1="48" x2="45.5" y2="48" stroke="#777" stroke-width="1"/>
  <line x1="44" y1="46.5" x2="44" y2="49.5" stroke="#777" stroke-width="1"/>
</svg>

<p id="hint">✂ 移動游標到彩帶，點擊進行剪綵 ✂</p>

<script>
(function () {
'use strict';

/* ── Pivot coordinates in the SVG (viewBox 96×96) ── */
const PIVOT_X = 44, PIVOT_Y = 48;
/* Open angle for each blade (degrees) */
const OPEN_DEG = 9;

/* ── DOM refs ── */
const curEl   = document.getElementById('cur');
const buEl    = document.getElementById('bu');
const blEl    = document.getElementById('bl');
const ribbonEl = document.getElementById('ribbon');
const rwrap   = document.getElementById('rwrap');
const victoryEl = document.getElementById('victory');
const hintEl  = document.getElementById('hint');
const confCvs = document.getElementById('confetti');
const confCtx = confCvs.getContext('2d');

let mx = -300, my = -300;
let hasCut = false;
let snipTimer = null;
let bladesOpen = true;
let sharedAc = null;

/* Create AudioContext on first user gesture so browser allows it */
function getAc() {
  if (!sharedAc) sharedAc = new (window.AudioContext || window.webkitAudioContext)();
  if (sharedAc.state === 'suspended') sharedAc.resume();
  return sharedAc;
}

/* ── Set blade SVG transform ── */
function setBlades(upperDeg, lowerDeg) {
  buEl.setAttribute('transform',
    `rotate(${upperDeg}, ${PIVOT_X}, ${PIVOT_Y})`);
  blEl.setAttribute('transform',
    `rotate(${lowerDeg}, ${PIVOT_X}, ${PIVOT_Y})`);
}
setBlades(-OPEN_DEG, OPEN_DEG); /* default: open */

/* ── Mouse tracking ── */
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  curEl.style.left = mx + 'px';
  curEl.style.top  = my + 'px';
  getAc(); /* warm up AudioContext on first move */
  if (!hasCut) checkNearRibbon();
}, { passive: true });

function ribbonRect() { return ribbonEl.getBoundingClientRect(); }

function isNear(e) {
  if (!ribbonEl.isConnected) return false;
  const r = ribbonRect();
  return my >= r.top - 18 && my <= r.bottom + 18
      && mx >= r.left && mx <= r.right;
}

let wasNear = false;
function checkNearRibbon() {
  const near = isNear();
  if (near === wasNear) return;
  wasNear = near;
  ribbonEl.classList.toggle('lit', near);
  if (near) startSnip();
  else       stopSnip();
}

/* ── Snip click sound ── */
function playSnipClick() {
  try {
    const ac = getAc();
    [[2400, 900, 0], [1800, 600, 0.01]].forEach(([f0, f1, dl]) => {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(f0, ac.currentTime + dl);
      osc.frequency.exponentialRampToValueAtTime(f1, ac.currentTime + dl + 0.07);
      g.gain.setValueAtTime(0.22, ac.currentTime + dl);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dl + 0.09);
      const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2000;
      osc.connect(hp); hp.connect(g); g.connect(ac.destination);
      osc.start(ac.currentTime + dl);
      osc.stop(ac.currentTime + dl + 0.1);
    });
  } catch (_) {}
}

/* ── Snip animation ── */
function startSnip() {
  if (snipTimer) return;
  snipTimer = setInterval(() => {
    setBlades(0, 0);
    playSnipClick();
    setTimeout(() => setBlades(-OPEN_DEG, OPEN_DEG), 110);
  }, 380);
}
function stopSnip() {
  clearInterval(snipTimer);
  snipTimer = null;
  setBlades(-OPEN_DEG, OPEN_DEG);
}

/* ── Stars ── */
for (let i = 0; i < 130; i++) {
  const s = document.createElement('div');
  const sz = Math.random() * 2.5 + 0.5;
  Object.assign(s.style, {
    position: 'fixed',
    width: sz + 'px', height: sz + 'px',
    borderRadius: '50%',
    background: '#fff',
    left: (Math.random() * 100) + '%',
    top:  (Math.random() * 100) + '%',
    animation: `twinkle ${(Math.random()*3+1).toFixed(2)}s ${(Math.random()*4).toFixed(2)}s infinite alternate`,
    pointerEvents: 'none',
    zIndex: 0
  });
  document.body.appendChild(s);
}

/* ── Confetti ── */
function resizeConf() {
  confCvs.width  = window.innerWidth;
  confCvs.height = window.innerHeight;
}
resizeConf();
window.addEventListener('resize', resizeConf);

const COLORS = [
  '#ff3030','#ff7700','#ffd700','#ffffff',
  '#cc00ee','#00d4ff','#ff69b4','#88ff44','#ff4499'
];

class Flake {
  constructor(x, y, big) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2;
    const spd = big ? (Math.random() * 22 + 6) : (Math.random() * 8 + 2);
    this.vx = Math.cos(a) * spd;
    this.vy = Math.sin(a) * spd - (big ? 9 : 2);
    this.color = COLORS[Math.random() * COLORS.length | 0];
    this.w = Math.random() * 13 + 5;
    this.h = Math.random() * 6 + 3;
    this.a = Math.random() * Math.PI * 2;
    this.av = (Math.random() - 0.5) * 0.22;
    this.g = 0.32 + Math.random() * 0.15;
    this.drag = 0.985;
    this.life = 1;
    this.decay = 0.007 + Math.random() * 0.012;
    this.circle = Math.random() > 0.45;
  }
  tick() {
    this.vy += this.g;
    this.vx *= this.drag; this.vy *= this.drag;
    this.x += this.vx; this.y += this.vy;
    this.a += this.av;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.a);
    ctx.fillStyle = this.color;
    if (this.circle) {
      ctx.beginPath();
      ctx.ellipse(0, 0, this.w/2, this.h/2, 0, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
    }
    ctx.restore();
  }
}

let flakes = [];
function burst(x, y, n, big = true) {
  for (let i = 0; i < n; i++) flakes.push(new Flake(x, y, big));
}

(function loop() {
  confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
  flakes = flakes.filter(f => f.life > 0 && f.y < confCvs.height + 60);
  flakes.forEach(f => { f.tick(); f.draw(confCtx); });
  requestAnimationFrame(loop);
})();

/* ── Audio synthesis ── */
function playSound() {
  const ac = getAc();

  /* Snip metallic click */
  {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / ac.sampleRate;
      d[i] = (Math.random()*2-1) * Math.exp(-t * 80) * 0.8;
    }
    const s = ac.createBufferSource(); s.buffer = buf;
    const hp = ac.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 3000;
    s.connect(hp); hp.connect(ac.destination);
    s.start(ac.currentTime);
  }

  /* Applause — modulated filtered noise */
  {
    const dur = 5.5, sr = ac.sampleRate;
    const buf = ac.createBuffer(2, sr * dur, sr);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < d.length; i++) {
        const t = i / sr;
        const env = t < 0.45 ? t / 0.45 : t > dur - 1.2 ? (dur - t) / 1.2 : 1;
        /* multiple overlapping clap rhythms → random-ish but clap-like */
        const rhy = 0.55
          + 0.25 * Math.abs(Math.sin(t * 7.3 + ch))
          + 0.20 * Math.abs(Math.sin(t * 5.1 + ch * 1.7));
        d[i] = (Math.random()*2-1) * env * rhy * 0.5;
      }
    }
    const src = ac.createBufferSource(); src.buffer = buf;
    const hp  = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 700;
    const bp  = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1600; bp.Q.value = 1;
    const g   = ac.createGain();
    g.gain.setValueAtTime(0, ac.currentTime + 0.05);
    g.gain.linearRampToValueAtTime(2.8, ac.currentTime + 0.5);
    g.gain.setValueAtTime(2.8, ac.currentTime + dur - 1.2);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + dur);
    src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(ac.destination);
    src.start(ac.currentTime + 0.05);
  }

  /* Fanfare melody */
  {
    const notes = [
      [523.25, 0.00, 0.30], [659.25, 0.18, 0.30], [783.99, 0.36, 0.42],
      [1046.5, 0.60, 1.00], [783.99, 0.80, 0.22], [880.00, 0.98, 0.22],
      [1046.5, 1.18, 1.60],
    ];
    notes.forEach(([freq, st, dur]) => {
      const osc = ac.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
      const g   = ac.createGain();
      g.gain.setValueAtTime(0, ac.currentTime + st);
      g.gain.linearRampToValueAtTime(0.18, ac.currentTime + st + 0.04);
      g.gain.setValueAtTime(0.16, ac.currentTime + st + dur - 0.06);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + st + dur);
      osc.connect(g); g.connect(ac.destination);
      osc.start(ac.currentTime + st);
      osc.stop(ac.currentTime + st + dur + 0.05);
    });
  }

  /* Crowd cheer — layered sawtooth oscillators with rising pitch */
  {
    [175, 215, 255, 295, 195, 235, 175].forEach((f, i) => {
      const osc = ac.createOscillator(); osc.type = 'sawtooth';
      const lp  = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1100 + i * 80;
      const g   = ac.createGain();
      const dl  = 0.08 + i * 0.04;
      osc.frequency.setValueAtTime(f, ac.currentTime + dl);
      osc.frequency.exponentialRampToValueAtTime(f * 1.45, ac.currentTime + dl + 0.9);
      osc.frequency.setValueAtTime(f * 1.35, ac.currentTime + dl + 1.1);
      osc.frequency.linearRampToValueAtTime(f * 1.25, ac.currentTime + dl + 3.5);
      g.gain.setValueAtTime(0, ac.currentTime + dl);
      g.gain.linearRampToValueAtTime(0.048, ac.currentTime + dl + 0.18);
      g.gain.setValueAtTime(0.048, ac.currentTime + dl + 3.2);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + dl + 4.5);
      osc.connect(lp); lp.connect(g); g.connect(ac.destination);
      osc.start(ac.currentTime + dl);
      osc.stop(ac.currentTime + dl + 5);
    });
  }
}

/* ── Cut ribbon ── */
document.addEventListener('click', e => {
  if (hasCut) return;

  /* Only trigger when cursor is on or very near the ribbon */
  const r = ribbonRect();
  if (e.clientY < r.top - 20 || e.clientY > r.bottom + 20
   || e.clientX < r.left || e.clientX > r.right) return;

  hasCut = true;
  stopSnip();
  ribbonEl.classList.remove('lit');

  /* Blade snap closed → slightly over → relax */
  setBlades(3, -3);
  setTimeout(() => setBlades(-5, 5), 90);

  /* Audio */
  playSound();

  /* Build ribbon halves */
  const cutX = e.clientX - r.left;
  const totalW = r.width;

  const lh = document.createElement('div');
  lh.className = 'rhalf rhalf-l';
  lh.style.width = cutX + 'px';

  const rh = document.createElement('div');
  rh.className = 'rhalf rhalf-r';
  rh.style.width = (totalW - cutX) + 'px';

  ribbonEl.style.visibility = 'hidden';
  rwrap.appendChild(lh);
  rwrap.appendChild(rh);

  /* Animate fall on next two frames */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    lh.style.transition = 'transform 2s cubic-bezier(0.15,0.8,0.35,1), opacity 2s';
    rh.style.transition = 'transform 2s cubic-bezier(0.15,0.8,0.35,1), opacity 2s';
    lh.style.transform = 'rotate(38deg)';  lh.style.opacity = '0';
    rh.style.transform = 'rotate(-38deg)'; rh.style.opacity = '0';
  }));

  /* Confetti bursts */
  burst(e.clientX, e.clientY, 260, true);
  setTimeout(() => burst(e.clientX - 180, e.clientY - 10, 90, true), 70);
  setTimeout(() => burst(e.clientX + 180, e.clientY - 10, 90, true), 110);
  setTimeout(() => burst(e.clientX, e.clientY - 20, 120, true), 210);
  setTimeout(() => {
    burst(window.innerWidth * 0.2, 60, 60, false);
    burst(window.innerWidth * 0.8, 60, 60, false);
  }, 450);
  setTimeout(() => {
    burst(window.innerWidth * 0.15, 80, 50, false);
    burst(window.innerWidth * 0.85, 80, 50, false);
    burst(window.innerWidth * 0.5, 50, 70, false);
  }, 750);

  /* Victory banner */
  hintEl.style.animation = 'none';
  hintEl.style.transition = 'opacity 0.5s';
  hintEl.style.opacity = '0';
  setTimeout(() => { hintEl.style.display = 'none'; }, 600);
  ['.title-sub', '.title-note'].forEach(sel => {
    const el = document.querySelector(sel);
    el.style.transition = 'opacity 0.7s';
    setTimeout(() => { el.style.opacity = '0'; }, 500);
    setTimeout(() => { el.style.visibility = 'hidden'; }, 1200);
  });
  setTimeout(() => victoryEl.classList.add('on'), 950);
});

})();
</script>
</body>
</html>
